suite_version: 1
category: explain
cases:
- id: exp-list-comp
  prompt: Explain what '[x*x for x in range(5)]' produces. Mention the values. Return only the explanation.
  system_prompt: You explain code clearly.
  gate:
    kind: structural
    contains: '16'
- id: exp-error
  prompt: Explain what causes a Python 'KeyError' in one sentence. Return only the sentence.
  system_prompt: You explain errors clearly.
  gate:
    kind: structural
    regex: (?i)key
- id: exp-async
  prompt: Explain in one sentence what 'await' does in Python async code. Return only the sentence.
  system_prompt: You explain concepts clearly.
  gate:
    kind: structural
    regex: (?i)(suspend|pause|wait|coroutine|yield)
- id: exp-git-rebase
  prompt: Explain in one sentence the difference between git merge and git rebase. Return only the sentence.
  system_prompt: You explain concepts clearly.
  gate:
    kind: structural
    regex: (?i)(history|linear|replay|commit)
- id: exp-2-001
  prompt: 'Explain the error in this code: ''int x = "hello";''. Return only the explanation.'
  system_prompt: Explain the error concisely.
  gate:
    kind: structural
    min_len: 20
- id: exp-2-002
  prompt: What does a 'NullPointerException' mean? Explain in one sentence.
  system_prompt: Explain in a single sentence.
  gate:
    kind: structural
    min_len: 20
- id: exp-2-003
  prompt: Explain why the loop 'for (int i = 0; i < 10; i++) { if (i == 5) continue; }' skips work on iteration 5. Return only the explanation.
  system_prompt: Concise explanation of loop behavior.
  gate:
    kind: structural
    min_len: 20
- id: exp-2-004
  prompt: Explain the purpose of the 'volatile' keyword in Java. Keep it to one sentence.
  system_prompt: Explain in one simple sentence.
  gate:
    kind: structural
    min_len: 20
