suite_version: 1
category: review
cases:
- id: rv-off-by-one
  prompt: 'Review this and name the bug in one phrase: ''for i in range(len(a)+1): print(a[i])''. Return only the phrase.'
  system_prompt: You review code precisely.
  gate:
    kind: structural
    regex: (?i)(index|out of range|off.?by.?one|bounds)
- id: rv-mutable-default
  prompt: 'Review: ''def f(x, acc=[]): acc.append(x); return acc''. Name the issue in one phrase. Return only the phrase.'
  system_prompt: You review code precisely.
  gate:
    kind: structural
    regex: (?i)(mutable|default|shared|alias)
- id: rv-sql-injection
  prompt: 'Review: ''cur.execute("SELECT * FROM u WHERE n=" + name)''. Name the vulnerability in one phrase. Return only the phrase.'
  system_prompt: You review code precisely.
  gate:
    kind: structural
    regex: (?i)(sql|injection)
- id: rv-resource-leak
  prompt: 'Review: ''f = open(path); data = f.read()''. Name the issue in one phrase. Return only the phrase.'
  system_prompt: You review code precisely.
  gate:
    kind: structural
    regex: (?i)(close|leak|context manager|with )
- id: rev-2-1
  prompt: 'Review this Python code and name at least one issue: ''def process_data(data):\n    if not data: return None\n    return [x * 2 for x in data if x > 0]'''
  system_prompt: Review code for potential issues.
  gate:
    kind: structural
    min_len: 30
- id: rev-2-2
  prompt: 'Analyze this function and name any logical error: ''def calculate_grade(score):\n    if score >= 90: return "A"\n    elif score >= 80: return "B"\n    elif score >= 70: return "C"\n    else: return "D"'''
  system_prompt: Analyze for logical errors.
  gate:
    kind: structural
    min_len: 30
- id: rev-2-3
  prompt: 'Name the security vulnerability in this code: ''import os\nos.system("rm -rf " + user_input)'''
  system_prompt: Identify security issues in code.
  gate:
    kind: structural
    min_len: 30
- id: rev-2-4
  prompt: 'Name the performance concern in this code: ''def get_users():\n    users = []\n    for i in range(1000000):\n        users.append({"id": i, "name": f"User{i}"})\n    return users'''
  system_prompt: Identify performance issues.
  gate:
    kind: structural
    min_len: 30
