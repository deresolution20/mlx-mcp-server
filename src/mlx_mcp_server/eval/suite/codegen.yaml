suite_version: 1
category: codegen
cases:
- id: cg-fizzbuzz
  prompt: Write a Python function fizzbuzz(n) returning a list of strings 1..n with Fizz/Buzz/FizzBuzz rules. Return only code.
  system_prompt: You are a concise coding assistant. Return only code.
  gate:
    kind: executable
    check_command: python3 -c 'import py_compile,sys; py_compile.compile(sys.argv[1], doraise=True)' $CANDIDATE_FILE
- id: cg-is-palindrome
  prompt: Write a Python function is_palindrome(s) that ignores case and non-alphanumerics. Return only code.
  system_prompt: You are a concise coding assistant. Return only code.
  gate:
    kind: executable
    check_command: python3 -c 'import py_compile,sys; py_compile.compile(sys.argv[1], doraise=True)' $CANDIDATE_FILE
- id: cg-merge-dicts
  prompt: Write a Python function merge(a, b) that returns a new dict with b overriding a. Return only code.
  system_prompt: You are a concise coding assistant. Return only code.
  gate:
    kind: executable
    check_command: python3 -c 'import py_compile,sys; py_compile.compile(sys.argv[1], doraise=True)' $CANDIDATE_FILE
- id: cg-flatten
  prompt: Write a Python function flatten(nested) that flattens one level of a list of lists. Return only code.
  system_prompt: You are a concise coding assistant. Return only code.
  gate:
    kind: executable
    check_command: python3 -c 'import py_compile,sys; py_compile.compile(sys.argv[1], doraise=True)' $CANDIDATE_FILE
- id: cg-2-1
  prompt: Write a Python function that takes a list of integers and returns the sum of all even numbers. Return only JSON with key "result" whose value is the function source as a string.
  system_prompt: You return only valid JSON.
  gate:
    kind: structural
    require_json: true
    schema_keys:
    - result
- id: cg-2-2
  prompt: Write a Python function named 'is_palindrome' that returns True if a string is a palindrome, else False. Include the def line.
  system_prompt: Implement a palindrome checker.
  gate:
    kind: structural
    regex: def is_palindrome
- id: cg-2-3
  prompt: Write a Python function named 'reverse_string' that returns its string argument reversed. Include the def line.
  system_prompt: Implement a string reversal function.
  gate:
    kind: structural
    regex: def reverse_string
- id: cg-2-4
  prompt: Write a Python function called 'find_max' that takes a list of numbers and returns the maximum value. Include the def line.
  system_prompt: Write a max finder function.
  gate:
    kind: structural
    regex: def find_max
